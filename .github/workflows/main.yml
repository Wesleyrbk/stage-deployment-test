name: Deploy cito-shared-services-prd-001

on:
  workflow_dispatch:
    inputs:
      validation_mode:
        type: boolean
        description: 'Validatie Modus'
        default: false
      deploy_all:
        type: boolean
        description: 'Deploy Everything'
        default: false
      deploy_subscription_iam:
        type: boolean
        description: 'Deploy Subscription and IAM'
        default: false
      deploy_vnet:
        type: boolean
        description: 'Deploy vNet'
        default: false
      deploy_pdns_resolver:
        type: boolean
        description: 'Deploy pDNS Resolver'
        default: false
      deploy_pdns_zone:
        type: boolean
        description: 'Deploy pDNS Zone'
        default: false
      deploy_rmpl:
        type: boolean
        description: 'Deploy RMPL'
        default: false
      deploy_keyvault:
        type: boolean
        description: 'Deploy Key Vault'
        default: false
      deploy_win_vmss:
        type: boolean
        description: 'Deploy Windows VMSS'
        default: false
      deploy_lnx_vmss:
        type: boolean
        description: 'Deploy Linux VMSS'
        default: false
      deploy_app_reg_monitoring:
        type: boolean
        description: 'Deploy App Reg Monitoring'
        default: false

env:
  SUBSCRIPTION_NAME: cito-shared-services-prd-001
  DEPLOYMENT_LOCATION: West Europe

jobs:

  # ── 1. Subscription & IAM ────────────────────────────────────────────────
  job_subscription_iam:
    name: Deploy Subscription and IAM
    runs-on: ubuntu-latest
    if: inputs.deploy_all == true || inputs.deploy_subscription_iam == true
    steps:
      - run: echo 'Deploying Subscription and IAM (scope: subscription)'

  # ── 2. vNet ──────────────────────────────────────────────────────────────
  job_vnet:
    name: Deploy vNet
    runs-on: ubuntu-latest
    needs: job_subscription_iam
    if: always() && (inputs.deploy_all == true || inputs.deploy_vnet == true) && (needs.job_subscription_iam.result == 'success' || needs.job_subscription_iam.result == 'skipped')
    steps:
      - run: echo 'Deploying vNet (rg: rg-vnet-prd-001)'

  # ── 3. pDNS Resolver ─────────────────────────────────────────────────────
  job_pdns_resolver:
    name: Deploy pDNS Resolver
    runs-on: ubuntu-latest
    needs: job_vnet
    if: always() && (inputs.deploy_all == true || inputs.deploy_pdns_resolver == true) && (needs.job_vnet.result == 'success' || needs.job_vnet.result == 'skipped')
    steps:
      - run: echo 'Deploying pDNS Resolver (rg: rg-dnsr-prd-001)'

  # ── 4. pDNS Zone ─────────────────────────────────────────────────────────
  job_pdns_zone:
    name: Deploy pDNS Zone
    runs-on: ubuntu-latest
    needs: job_pdns_resolver
    if: always() && (inputs.deploy_all == true || inputs.deploy_pdns_zone == true) && (needs.job_pdns_resolver.result == 'success' || needs.job_pdns_resolver.result == 'skipped')
    steps:
      - run: echo 'Deploying pDNS Zone (rg: rg-dnsz-prd-001)'

  # ── 5. RMPL ──────────────────────────────────────────────────────────────
  job_rmpl:
    name: Deploy RMPL
    runs-on: ubuntu-latest
    needs: job_pdns_zone
    if: always() && (inputs.deploy_all == true || inputs.deploy_rmpl == true) && (needs.job_pdns_zone.result == 'success' || needs.job_pdns_zone.result == 'skipped')
    steps:
      - run: echo 'Deploying RMPL (rg: rg-rmpl-prd-001)'

  # ── 6. Key Vault ─────────────────────────────────────────────────────────
  job_keyvault:
    name: Deploy Key Vault
    runs-on: ubuntu-latest
    needs: job_rmpl
    if: always() && (inputs.deploy_all == true || inputs.deploy_keyvault == true) && (needs.job_rmpl.result == 'success' || needs.job_rmpl.result == 'skipped')
    steps:
      - run: echo 'Deploying Key Vault (rg: rg-kv-prd-001)'

  # ── 7a. Windows VMSS ─────────────────────────────────────────────────────
  job_win_vmss:
    name: Deploy Windows VMSS
    runs-on: ubuntu-latest
    needs: job_keyvault
    if: always() && (inputs.deploy_all == true || inputs.deploy_win_vmss == true) && (needs.job_keyvault.result == 'success' || needs.job_keyvault.result == 'skipped')
    steps:
      - run: echo 'Deploying Windows VMSS (rg: rg-vmss-prd-001, bicep: deploy_win.bicep)'

  # ── 7b. Linux VMSS ───────────────────────────────────────────────────────
  job_lnx_vmss:
    name: Deploy Linux VMSS
    runs-on: ubuntu-latest
    needs: job_keyvault
    if: always() && (inputs.deploy_all == true || inputs.deploy_lnx_vmss == true) && (needs.job_keyvault.result == 'success' || needs.job_keyvault.result == 'skipped')
    steps:
      - run: echo 'Deploying Linux VMSS (rg: rg-vmss-prd-001, bicep: deploy_lnx.bicep)'

  # ── 8. App Reg Monitoring ─────────────────────────────────────────────────
  job_app_reg_monitoring:
    name: Deploy App Reg Monitoring
    runs-on: ubuntu-latest
    needs: [job_win_vmss, job_lnx_vmss]
    if: always() && (inputs.deploy_all == true || inputs.deploy_app_reg_monitoring == true) && (needs.job_win_vmss.result == 'success' || needs.job_win_vmss.result == 'skipped') && (needs.job_lnx_vmss.result == 'success' || needs.job_lnx_vmss.result == 'skipped')
    steps:
      - run: echo 'Deploying App Reg Monitoring (rg: rg-app-reg-monitoring-prd-001)'
