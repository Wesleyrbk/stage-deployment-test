on:
  workflow_dispatch:
    inputs:
      deploy_all:
        type: boolean
        description: "Deploy everything"
        default: false
      deploy_vnet:
        type: boolean
        description: "Deploy VNet"
        default: false
      deploy_vm:
        type: boolean
        description: "Deploy VM"
        default: false

jobs:
  deploy_vnet:
    if: inputs.deploy_all == true || inputs.deploy_vnet == true
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying VNet"

  deploy_vm:
    needs: deploy_vnet
    if: |
      always() &&
      (inputs.deploy_all == true || inputs.deploy_vm == true) &&
      (needs.deploy_vnet.result == 'success' || needs.deploy_vnet.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying VM"
